name: Auto Blog Publish

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 UTC 01:00 = 한국시간 오전 10시
  workflow_dispatch:        # "지금 바로 실행" 버튼으로도 수동 실행 가능

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and push
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "auto-blog-bot@users.noreply.github.com"
          git add blog/ sitemap.xml robots.txt
          git diff --cached --quiet && echo "변경 없음" && exit 0
          git commit -m "자동 블로그 발행 $(date +'%Y-%m-%d')"
          git push
